<!-- SYSTEM BASE TEMPLATE STRUCTURE EMBEDDED WITHIN INDIVIDUAL SUBPAGES -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[DYNAMIC_TITLE] | HK Lawyer Things</title>
    <style>
        :root { --bg-main: #0A0A0A; --bg-card: #141414; --primary-accent: #FFFFFF; --secondary-accent: #90A4AE; --gold: #D4AF37; --border-color: #2C2C2E; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { color: var(--primary-accent); background-color: var(--bg-main); line-height: 1.6; }
        nav { background-color: var(--bg-main); padding: 25px 10%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.3rem; color: var(--primary-accent); letter-spacing: 1px; text-decoration: none; }
        .logo span { color: var(--gold); }
        .nav-links a { text-decoration: none; color: var(--secondary-accent); margin-left: 30px; font-size: 0.95rem; font-weight: 500; }
        .nav-links .btn-nav { background-color: var(--primary-accent); color: var(--bg-main); padding: 8px 18px; border-radius: 4px; font-weight: 600; }
        .blog-wrapper { padding: 80px 10%; max-width: 900px; margin: 0 auto; }
        .btn-back { display: inline-block; color: var(--gold); text-decoration: none; font-size: 0.95rem; margin-bottom: 30px; font-weight: 600; }
        .blog-header h1 { font-size: 2.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 15px; }
        .blog-meta { font-size: 0.85rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 40px; font-weight: 600; }
        .blog-body { color: #E5E5EA; font-size: 1.05rem; line-height: 1.7; }
        .blog-body p { margin-bottom: 20px; }
        .blog-body h4 { color: var(--primary-accent); font-size: 1.3rem; margin: 35px 0 15px 0; font-weight: 700; border-left: 3px solid var(--gold); padding-left: 12px; }
        .blog-body ul { margin: 0 0 25px 25px; }
        .blog-body li { margin-bottom: 10px; }
        .alert-box { background-color: rgba(212, 175, 55, 0.08); border: 1px dashed var(--gold); padding: 20px; border-radius: 4px; margin-bottom: 25px; }
        .numbered-heading { color: var(--gold); font-family: monospace; font-size: 1.1rem; display: block; margin-top: 35px; }
        .salary-table { width: 100%; border-collapse: collapse; margin: 20px 0 30px 0; font-size: 0.95rem; }
        .salary-table th, .salary-table td { border: 1px solid var(--border-color); padding: 12px 15px; text-align: left; }
        .salary-table th { background-color: #141414; color: var(--gold); }
        .salary-table tr:nth-child(even) { background-color: rgba(255,255,255,0.02); }
        .seo-tags { margin-top: 45px; padding-top: 20px; border-top: 1px solid var(--border-color); font-size: 0.85rem; color: var(--secondary-accent); font-style: italic; }
        footer { background-color: var(--bg-main); color: #555555; padding: 40px 10%; text-align: center; font-size: 0.85rem; border-top: 1px solid var(--border-color); }
        @media (max-width: 768px) { .blog-header h1 { font-size: 1.8rem; } nav { flex-direction: column; gap: 20px; } .nav-links a { margin: 5px 12px; } }
    </style>
</head>
